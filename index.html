<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Caloryx Ai</title>
  <style>
    :root {
      --bg: #f2f2f3;
      --surface: #ffffff;
      --soft: #f4f4f4;
      --text: #111318;
      --muted: #878b96;
      --line: #e8e8ea;
      --green: #a8e347;
      --green-dark: #72b900;
      --pink: #ed6b98;
      --shadow: 0 14px 36px rgba(24, 26, 31, .08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    }

    .app {
      min-height: 100vh;
      padding: 18px 18px 20px;
      max-width: 420px;
      margin: 0 auto;
      position: relative;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 20px;
      font-weight: 800;
    }

    .brand-icon {
      display: grid;
      place-items: center;
      width: 26px;
      height: 26px;
      border-radius: 7px;
      background: linear-gradient(135deg, #fff 0%, #c7f16a 45%, #ff8b3d 100%);
      box-shadow: inset 0 0 0 2px #fff, 0 4px 10px rgba(0, 0, 0, .12);
      font-size: 16px;
    }

    .profile {
      border: 0;
      border-radius: 999px;
      background: #fff;
      color: #a2a5ae;
      padding: 8px 13px;
      font-size: 13px;
      font-weight: 700;
    }

    .month-row {
      display: grid;
      grid-template-columns: 46px 1fr 76px;
      align-items: center;
      gap: 12px;
      margin: 2px 0 12px;
    }

    .round-btn,
    .today-btn {
      height: 32px;
      border: 0;
      font-weight: 800;
      cursor: pointer;
    }

    .round-btn {
      border-radius: 999px;
      background: #fff;
      font-size: 20px;
      line-height: 1;
    }

    .today-btn {
      border-radius: 999px;
      background: #2f3034;
      color: #fff;
      font-size: 12px;
    }

    .month {
      text-align: center;
      font-size: 16px;
      font-weight: 800;
    }

    .calendar {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      margin-bottom: 14px;
      color: var(--muted);
    }

    .day {
      height: 82px;
      display: grid;
      grid-template-rows: 22px 26px 12px;
      align-items: center;
      justify-items: center;
      border-radius: 13px;
      font-size: 13px;
      font-weight: 700;
      color: #b5b7be;
    }

    .day strong {
      color: #17181b;
      font-size: 15px;
    }

    .day .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #fff;
    }

    .day.active {
      background: var(--green);
      color: #fff;
    }

    .day.active strong {
      display: grid;
      place-items: center;
      width: 35px;
      height: 24px;
      border-radius: 999px;
      background: #fff;
    }

    .summary {
      background: #fff;
      border-radius: 16px;
      padding: 18px 16px 16px;
      box-shadow: var(--shadow);
      margin-bottom: 12px;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: 1fr 92px;
      gap: 14px;
      align-items: center;
      margin-bottom: 12px;
    }

    .small-label {
      color: #6e727b;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }

    .leaf {
      display: grid;
      place-items: center;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #edf8df;
      color: var(--green-dark);
      font-weight: 900;
    }

    .calories {
      font-size: 36px;
      line-height: 1;
      font-weight: 800;
      letter-spacing: 0;
    }

    .ring {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      border: 7px solid #ececef;
      display: grid;
      place-items: center;
      text-align: center;
      font-weight: 800;
    }

    .ring span {
      display: block;
      color: #a6aab4;
      font-size: 12px;
      margin-bottom: 4px;
    }

    .useful {
      background: var(--soft);
      border-radius: 12px;
      padding: 12px;
    }

    .useful-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 13px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .score {
      border-radius: 999px;
      background: var(--green);
      color: #fff;
      padding: 2px 7px;
    }

    .bar {
      height: 10px;
      border-radius: 999px;
      background: #fff;
      overflow: hidden;
    }

    .bar i {
      display: block;
      width: 0%;
      height: 100%;
      background: var(--green);
    }

    .macros {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 14px;
    }

    .macro {
      background: #fff;
      border-radius: 14px;
      padding: 12px 8px 14px;
      text-align: center;
      min-height: 136px;
    }

    .macro-ring {
      width: 62px;
      height: 62px;
      border-radius: 50%;
      border: 6px solid #ececef;
      display: grid;
      place-items: center;
      color: #9fa4af;
      font-weight: 900;
      margin: 0 auto 12px;
    }

    .macro strong {
      display: block;
      font-size: 14px;
      margin-bottom: 8px;
    }

    .macro span {
      color: #b39ca9;
      font-size: 13px;
      font-weight: 800;
    }

    .section-title {
      margin: 0 0 10px;
      font-size: 16px;
      font-weight: 800;
    }

    .history {
      display: grid;
      gap: 8px;
      padding-bottom: 72px;
    }

    .history-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #fff;
      border-radius: 12px;
      padding: 11px 12px;
      font-size: 13px;
      color: #555a64;
    }

    .history-item b {
      color: #17181b;
    }

    .add-button {
      position: fixed;
      right: max(24px, calc((100vw - 420px) / 2 + 24px));
      bottom: 32px;
      height: 50px;
      border-radius: 999px;
      border: 2px solid var(--green);
      background: #050506;
      color: #fff;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 0 18px;
      font-size: 14px;
      font-weight: 800;
      box-shadow: 0 8px 20px rgba(0, 0, 0, .25);
      cursor: pointer;
    }

    .plus {
      font-size: 34px;
      line-height: 1;
      font-weight: 300;
    }

    .sheet {
      position: fixed;
      inset: auto 0 0;
      background: #fff;
      border-radius: 22px 22px 0 0;
      padding: 18px;
      box-shadow: 0 -18px 50px rgba(0, 0, 0, .18);
      transform: translateY(110%);
      transition: transform .24s ease;
      max-width: 420px;
      margin: 0 auto;
    }

    .sheet.open {
      transform: translateY(0);
    }

    .sheet h2 {
      margin: 0 0 12px;
      font-size: 19px;
    }

    .field {
      display: grid;
      gap: 6px;
      margin-bottom: 10px;
      color: #676b75;
      font-size: 12px;
      font-weight: 800;
    }

    .field input {
      height: 42px;
      border-radius: 10px;
      border: 1px solid var(--line);
      padding: 0 12px;
      font-size: 15px;
      font-weight: 700;
      outline: none;
    }

    .sheet-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }

    .sheet-actions button {
      height: 44px;
      border: 0;
      border-radius: 12px;
      font-weight: 900;
      cursor: pointer;
    }

    .ghost {
      background: #f0f0f2;
      color: #565b65;
    }

    .send {
      background: var(--green);
      color: #fff;
    }

    @media (max-width: 360px) {
      .app {
        padding-inline: 12px;
      }

      .summary-grid {
        grid-template-columns: 1fr 78px;
      }

      .ring {
        width: 78px;
        height: 78px;
      }

      .macro {
        min-height: 124px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand"><span class="brand-icon">🥗</span> Caloryx</div>
      <button class="profile" type="button">👤 Профиль</button>
    </header>

    <section class="month-row" aria-label="Календарь">
      <button class="round-btn" type="button">⌄</button>
      <div class="month">Июль 2026</div>
      <button class="today-btn" type="button">Сегодня</button>
    </section>

    <section class="calendar">
      <div class="day"><span>Пн</span><strong>6</strong><i class="dot"></i></div>
      <div class="day"><span>Вт</span><strong>7</strong><i class="dot"></i></div>
      <div class="day active"><span>Ср</span><strong>8</strong><i class="dot"></i></div>
      <div class="day"><span>Чт</span><strong>9</strong><i class="dot"></i></div>
      <div class="day"><span>Пт</span><strong>10</strong><i class="dot"></i></div>
      <div class="day"><span>Сб</span><strong>11</strong><i class="dot"></i></div>
      <div class="day"><span>Вс</span><strong>12</strong><i class="dot"></i></div>
    </section>

    <section class="summary">
      <div class="summary-grid">
        <div>
          <div class="small-label"><span class="leaf">◔</span> Осталось калорий</div>
          <div class="calories" id="leftCalories">2188</div>
        </div>
        <div class="ring"><div><span id="eatenRing">0 /</span><b id="targetRing">2188</b></div></div>
      </div>
      <div class="useful">
        <div class="useful-row"><span>💗 Полезность</span><span class="score">0/10</span></div>
        <div class="bar"><i></i></div>
      </div>
    </section>

    <section class="macros">
      <article class="macro"><div class="macro-ring">Б</div><strong>0/158</strong><span>Белки</span></article>
      <article class="macro"><div class="macro-ring">Ж</div><strong>0/68</strong><span>Жиры</span></article>
      <article class="macro"><div class="macro-ring">У</div><strong>0/236</strong><span>Углеводы</span></article>
    </section>

    <h1 class="section-title">История</h1>
    <section class="history" id="history">
      <div class="history-item"><b>Сегодня пока пусто</b><span>0 ккал</span></div>
    </section>

    <button class="add-button" id="openSheet" type="button"><span class="plus">+</span> Добавить</button>
  </main>

  <section class="sheet" id="sheet" aria-label="Добавить еду">
    <h2>Добавить прием пищи</h2>
    <label class="field">Название
      <input id="foodName" value="Скан продукта" autocomplete="off">
    </label>
    <label class="field">Граммы
      <input id="grams" type="number" value="100" min="1" max="5000">
    </label>
    <label class="field">Калории
      <input id="calories" type="number" value="320" min="1" max="10000">
    </label>
    <div class="sheet-actions">
      <button class="ghost" id="closeSheet" type="button">Отмена</button>
      <button class="send" id="sendMeal" type="button">Добавить</button>
    </div>
  </section>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script>
    const tg = window.Telegram?.WebApp;
    const sheet = document.querySelector("#sheet");
    const history = document.querySelector("#history");
    const leftCalories = document.querySelector("#leftCalories");
    const eatenRing = document.querySelector("#eatenRing");
    const targetRing = document.querySelector("#targetRing");
    let target = 2188;
    let eaten = 0;

    tg?.ready();
    tg?.expand();
    tg?.setHeaderColor("#f2f2f3");
    tg?.setBackgroundColor("#f2f2f3");

    document.querySelector("#openSheet").addEventListener("click", () => {
      sheet.classList.add("open");
    });

    document.querySelector("#closeSheet").addEventListener("click", () => {
      sheet.classList.remove("open");
    });

    document.querySelector("#sendMeal").addEventListener("click", () => {
      const foodName = document.querySelector("#foodName").value.trim() || "Скан продукта";
      const grams = Number(document.querySelector("#grams").value) || 100;
      const calories = Number(document.querySelector("#calories").value) || 1;
      const payload = { food_name: foodName, grams, calories };

      eaten += calories;
      leftCalories.textContent = Math.max(target - eaten, 0);
      eatenRing.textContent = `${eaten} /`;
      targetRing.textContent = target;
      history.innerHTML = `<div class="history-item"><b>${foodName}, ${grams} г</b><span>${calories} ккал</span></div>` + history.innerHTML;
      sheet.classList.remove("open");

      if (tg?.sendData) {
        tg.sendData(JSON.stringify(payload));
      }
    });
  </script>
</body>
</html>
